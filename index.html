<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Vault</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; font-family:'Orbitron',sans-serif; background:black; color:cyan; }
nav { display:flex; justify-content:center; gap:20px; background:#111; padding:10px; }
nav button {
  background:black; color:cyan; border:1px solid cyan; padding:8px 15px; cursor:pointer; transition:0.3s;
}
nav button:hover { background:cyan; color:black; box-shadow:0 0 10px cyan,0 0 20px cyan; }
.panel { border:1px solid cyan; padding:15px; margin:10px; }
.page{display:none;} .active{display:block;}
canvas{width:100%;}.post-card {
  transition: transform 0.3s ease, box-shadow 0.3s ease;}
  .post-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px cyan;
}

#posts {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 10px;
}

.post-card {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.post-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px cyan;
}

</style>
</head>

<body>

<h1 style="text-align:center;">🌌 Science Vault</h1>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('about')">About</button>
</nav>

<div id="home" class="page active">

<div class="panel">
<h2>🔐 Admin Login</h2>
<input id="pw" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<div id="admin" class="panel" style="display:none;">
<h3>Add Essay</h3>
<input id="title" placeholder="Title"><br><br>
<textarea id="content" placeholder="Write essay"></textarea><br><br>
<input type="file" id="image"><br><br>
<button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>

<div class="panel">
<h2>🪐 Solar System Simulation</h2>
<canvas id="sim"></canvas>
</div>

</div>

<div id="about" class="page">
<h2 style="text-align:center;">🌌 About Me</h2>
<p style="text-align:center; max-width:600px; margin:auto;">
I’m passionate about science, technology, and creativity. I enjoy exploring space, building simulations, and turning ideas into interactive experiences.
<br><br>🚀 Always learning. Always building.
</p>
</div>

<button onclick="toggleMusic()" style="position:fixed;top:10px;right:10px;">🔊</button>
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6d4c3f3e7f.mp3?filename=space-ambient-11041.mp3">
</audio>

<script>
// NAV
function showPage(page){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(page).classList.add('active');
}

// ADMIN
function login(){
 const input=document.getElementById("pw").value;
 if(input==="Redsaucepasta@67"){
  document.getElementById("admin").style.display="block";
 } else alert("Wrong password");
}

function addPost(){
 const t=document.getElementById('title').value;
 const c=document.getElementById('content').value;
 const img=document.getElementById('image').files[0];
 if(!t||!c){alert('Fill all fields');return;}
 const div=document.createElement('div');
 if(img){
  const r=new FileReader();
  r.onload=e=>{div.innerHTML=`<h3>${t}</h3><img src="${e.target.result}" style="max-width:100%"><p>${c}</p>`};
  r.readAsDataURL(img);
 } else div.innerHTML=`<h3>${t}</h3><p>${c}</p>`;
 document.getElementById('posts').prepend(div);
}

// MUSIC
let playing=false;
function toggleMusic(){
 const m=document.getElementById("bgMusic");
 if(!playing){m.play();playing=true;} else {m.pause();playing=false;}
}

// SOLAR SYSTEM
const scene=new THREE.Scene();
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("sim"),antialias:true});
renderer.setSize(window.innerWidth,400);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/400,0.1,2000);
camera.position.set(0,20,60);
const controls=new THREE.OrbitControls(camera,renderer.domElement);

scene.add(new THREE.PointLight(0xffffff,2));
scene.add(new THREE.AmbientLight(0x222222));

// stars
const stars=new THREE.BufferGeometry();
let verts=[];
for(let i=0;i<4000;i++){verts.push((Math.random()-0.5)*2000,(Math.random()-0.5)*2000,(Math.random()-0.5)*2000);}
stars.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
scene.add(new THREE.Points(stars,new THREE.PointsMaterial({color:0xffffff})));

// sun
const sun=new THREE.Mesh(new THREE.SphereGeometry(5,64,64),new THREE.MeshBasicMaterial({color:0xffcc00}));
scene.add(sun);

function planet(size,color,dist,speed){
 const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,32,32),new THREE.MeshStandardMaterial({color}));
 const pivot=new THREE.Object3D();
 scene.add(pivot); pivot.add(mesh); mesh.position.x=dist;
 return {pivot,speed,mesh};
}

const mercury=planet(0.5,0xaaa,8,0.02);
const venus=planet(0.9,0xffcc99,11,0.015);
const earth=planet(1,0x3399ff,14,0.01);
const mars=planet(0.8,0xff3300,17,0.008);
const jupiter=planet(2.5,0xffcc99,22,0.006);
const saturn=planet(2.2,0xffddaa,28,0.005);
const uranus=planet(1.5,0x66ffff,34,0.003);
const neptune=planet(1.5,0x3366ff,40,0.002);

// moon
const moonPivot=new THREE.Object3D();
earth.mesh.add(moonPivot);
const moon=new THREE.Mesh(new THREE.SphereGeometry(0.27,32,32),new THREE.MeshStandardMaterial({color:0xaaa}));
moon.position.x=2; moonPivot.add(moon);

// rings
const ring=new THREE.Mesh(new THREE.RingGeometry(3,5,64),new THREE.MeshBasicMaterial({color:0xccc,side:THREE.DoubleSide}));
ring.rotation.x=Math.PI/2; saturn.mesh.add(ring);

function animate(){
 requestAnimationFrame(animate);
 mercury.pivot.rotation.y+=mercury.speed;
 venus.pivot.rotation.y+=venus.speed;
 earth.pivot.rotation.y+=earth.speed;
 mars.pivot.rotation.y+=mars.speed;
 jupiter.pivot.rotation.y+=jupiter.speed;
 saturn.pivot.rotation.y+=saturn.speed;
 uranus.pivot.rotation.y+=uranus.speed;
 neptune.pivot.rotation.y+=neptune.speed;
 moonPivot.rotation.y+=0.03;
 earth.mesh.rotation.y+=0.02;
 controls.update(); renderer.render(scene,camera);
}
animate();
</script>

<footer style="text-align:center;padding:20px;border-top:1px solid cyan;">© 2026 Science Vault</footer>

</body>
</html>
