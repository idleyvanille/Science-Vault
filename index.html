<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Vault</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; font-family:'Orbitron',sans-serif; background:black; color:cyan; }
nav { display:flex; justify-content:center; gap:20px; background:#111; padding:10px; }
nav button { background:black; color:cyan; border:1px solid cyan; padding:8px 15px; }
.panel { border:1px solid cyan; padding:15px; margin:10px; }
.page { display:none; }
.active { display:block; }
#about { text-align:center; padding:20px; }
canvas { width:100%; }
</style>
</head>

<body>

<h1 style="text-align:center;">🌌 Science Vault</h1>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('about')">About</button>
</nav>

<div id="home" class="page active">
<div class="panel">
<h2>🪐 Solar System</h2>
<canvas id="sim"></canvas>
</div>

<div class="panel">
<h2>⚛️ Double Slit</h2>
<canvas id="slitCanvas" width="800" height="200"></canvas>
</div>

<div class="panel">
<input id="pw" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="admin" class="panel" style="display:none;">
<input id="title" placeholder="Title"><br><br>
<textarea id="content"></textarea><br><br>
<input type="file" id="image"><br><br>
<button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>
</div>

<div id="about" class="page">
<h2>🌌 About Me</h2>
<p>I’m passionate about science, tech, and creativity.</p>
<p><b>Science Vault</b> is where I share physics and coding.</p>
<p>🚀 Always learning.</p>
</div>

<!-- MUSIC -->
<button onclick="toggleMusic()" style="position:fixed;top:10px;right:10px;">🔊</button>
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6d4c3f3e7f.mp3?filename=space-ambient-11041.mp3">
</audio>

<script>
try {

// NAV
function showPage(p){
 document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
 const el = document.getElementById(p);
 if(el) el.classList.add('active');
}

// LOGIN
function login(){
 const pw = document.getElementById('pw').value;
 if(pw === "Redsaucepasta@67"){
   document.getElementById('admin').style.display='block';
   alert('Logged in');
 } else {
   alert('Wrong password');
 }
}

function addPost(){
 const t=document.getElementById('title').value;
 const c=document.getElementById('content').value;
 const img=document.getElementById('image').files[0];
 const div=document.createElement('div');

 if(!t || !c){ alert('fill all fields'); return; }

 if(img){
  const r=new FileReader();
  r.onload=e=>{
    div.innerHTML=`<h3>${t}</h3><img src="${e.target.result}"><p>${c}</p>`;
  };
  r.readAsDataURL(img);
 } else {
  div.innerHTML=`<h3>${t}</h3><p>${c}</p>`;
 }

 document.getElementById('posts').prepend(div);
}

// MUSIC
let playing=false;
function toggleMusic(){
 const m=document.getElementById('bgMusic');
 if(!m) return;
 if(!playing){ m.play(); playing=true; }
 else { m.pause(); playing=false; }
}

// THREE SIM (SAFE)
const sim=document.getElementById('sim');
if(sim && window.THREE){
 const scene=new THREE.Scene();
 const renderer=new THREE.WebGLRenderer({canvas:sim});
 renderer.setSize(500,300);
 const camera=new THREE.PerspectiveCamera(75,500/300,0.1,1000);
 camera.position.z=30;
 const earthPivot=new THREE.Object3D();
 scene.add(earthPivot);
 const earth=new THREE.Mesh(new THREE.SphereGeometry(1,16,16),new THREE.MeshBasicMaterial({color:0x3399ff}));
 earth.position.x=10;
 earthPivot.add(earth);
 function animate(){requestAnimationFrame(animate);earthPivot.rotation.y+=0.01;renderer.render(scene,camera);}animate();
} else {
 console.error('Three.js failed');
}

// SLIT SIM (SAFE)
const s=document.getElementById('slitCanvas');
if(s){
 const ctx=s.getContext('2d');
 let parts=[];
 function create(){return{x:100,y:Math.random()*200,vx:2,vy:(Math.random()-0.5)*2}}
 function loop(){
  ctx.fillStyle='black';
  ctx.fillRect(0,0,800,200);
  ctx.fillStyle='cyan';
  if(Math.random()<0.3) parts.push(create());
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;ctx.fillRect(p.x,p.y,2,2)});
  requestAnimationFrame(loop);
 }
 loop();
} else {
 console.error('Slit canvas missing');
}

} catch(e) {
 console.error('ERROR:', e);
 alert('Something broke — open console (F12)');
}
</script>

<footer style="text-align:center;">© 2026 Science Vault</footer>

</body>
</html>
