<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Vault</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body {
  margin:0;
  font-family:'Orbitron',sans-serif;
  background: radial-gradient(circle at center, #050510, #000);
  color: cyan;
}

nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

nav button {
  background:transparent;
  border:1px solid cyan;
  color:cyan;
  padding:10px 20px;
  cursor:pointer;
  transition:0.3s;
}

nav button:hover {
  background:cyan;
  color:black;
  box-shadow:0 0 15px cyan;
}

.page { display:none; }
.active { display:block; }

.panel {
  margin:20px;
  padding:20px;
  border-radius:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  border:1px solid rgba(0,255,255,0.3);
}

canvas { width:100%; border-radius:10px; }

footer {
  text-align:center;
  padding:20px;
  border-top:1px solid cyan;
}
</style>
</head>

<body>

<h1 style="text-align:center;">🌌 Science Vault</h1>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('about')">About</button>
</nav>

<div id="home" class="page active">

<div class="panel">
<h2>🪐 Solar System</h2>
<canvas id="sim"></canvas>
</div>

<div class="panel">
<h2>⚛️ Quantum Lab</h2>
<canvas id="slitCanvas" width="800" height="200"></canvas>
</div>

</div>

<div id="about" class="page">
<h2 style="text-align:center;">🌌 About Me</h2>
<p style="text-align:center; max-width:600px; margin:auto;">
I’m passionate about science, technology, and creativity. Science Vault is where I explore space, physics, and coding.
<br><br>🚀 Always learning. Always building.
</p>
</div>

<button onclick="toggleMusic()" style="position:fixed;top:10px;right:10px;">🔊</button>
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6d4c3f3e7f.mp3?filename=space-ambient-11041.mp3">
</audio>

<script>
// NAV
function showPage(p){
 document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}

// MUSIC
let playing=false;
function toggleMusic(){
 const m=document.getElementById('bgMusic');
 if(!playing){m.play();playing=true;} else{m.pause();playing=false;}
}

// SOLAR SYSTEM (FULL)
const sim=document.getElementById('sim');
const scene=new THREE.Scene();
const renderer=new THREE.WebGLRenderer({canvas:sim, antialias:true});
renderer.setSize(window.innerWidth,400);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/400,0.1,1000);
camera.position.z=40;
const controls=new THREE.OrbitControls(camera,renderer.domElement);

scene.add(new THREE.PointLight(0xffffff,2));

function planet(size,color,dist,speed){
 const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,32,32),new THREE.MeshStandardMaterial({color}));
 const pivot=new THREE.Object3D();
 scene.add(pivot);
 pivot.add(mesh);
 mesh.position.x=dist;
 return {pivot,speed,mesh};
}

const earth=planet(1,0x3399ff,12,0.01);
const mars=planet(0.8,0xff3300,16,0.008);

function animate(){
 requestAnimationFrame(animate);
 earth.pivot.rotation.y+=earth.speed;
 mars.pivot.rotation.y+=mars.speed;
 earth.mesh.rotation.y+=0.02;
 renderer.render(scene,camera);
}
animate();

// QUANTUM SIM
const c=document.getElementById('slitCanvas');
const ctx=c.getContext('2d');
let parts=[];
function create(){return{x:100,y:Math.random()*200,vx:2,vy:(Math.random()-0.5)*2}}
function loop(){
 ctx.fillStyle='black'; ctx.fillRect(0,0,800,200);
 ctx.fillStyle='cyan';
 if(Math.random()<0.3) parts.push(create());
 parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;ctx.fillRect(p.x,p.y,2,2)});
 requestAnimationFrame(loop);
}
loop();
</script>

<footer>© 2026 Science Vault</footer>

</body>
</html>
