let playing=false;

// THREE SIM
const sim=document.getElementById('sim');
const scene=new THREE.Scene();
const renderer=new THREE.WebGLRenderer({canvas:sim, antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,300);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/300,0.1,1000);
camera.position.z=30;
const controls=new THREE.OrbitControls(camera,renderer.domElement);
const sun=new THREE.Mesh(new THREE.SphereGeometry(3,32,32),new THREE.MeshBasicMaterial({color:0xffcc00}));
scene.add(sun);
const earthPivot=new THREE.Object3D();
scene.add(earthPivot);
const earth=new THREE.Mesh(new THREE.SphereGeometry(1,32,32),new THREE.MeshStandardMaterial({color:0x3399ff}));
earth.position.x=10;
earthPivot.add(earth);
scene.add(new THREE.PointLight(0xffffff,2));
function animate(){requestAnimationFrame(animate);earthPivot.rotation.y+=0.01;earth.rotation.y+=0.02;renderer.render(scene,camera);}animate();

// SLIT
const s=document.getElementById('slitCanvas');
const ctx=s.getContext('2d');
let parts=[];
function create(){return{x:100,y:Math.random()*200,vx:2,vy:(Math.random()-0.5)*2}}
function loop(){
ctx.fillStyle='black';
ctx.fillRect(0,0,800,200);
ctx.fillStyle='cyan';
if(Math.random()<0.3)parts.push(create());
parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;ctx.fillRect(p.x,p.y,2,2)});
