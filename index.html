<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Vault</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: cyan;
}

/* UI PANEL */
.panel {
  background: rgba(0,0,0,0.7);
  border: 1px solid cyan;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  box-shadow: 0 0 10px cyan;
}

/* POSTS */
.post {
  border: 1px solid cyan;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

img {
  max-width: 100%;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1 style="text-align:center;">🌌 Science Vault</h1>

<!-- SIMULATION -->
<div class="panel">
  <h2>🪐 Solar System Simulation</h2>
  <canvas id="sim"></canvas>
</div>

<!-- ESSAYS -->
<div class="panel">
  <h2>📚 Essays</h2>
  <div id="posts"></div>
</div>

<!-- LOGIN -->
<div class="panel">
  <input id="pw" placeholder="Admin password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="panel" style="display:none;">
  <h3>Add Essay</h3>
  <input id="title" placeholder="Title"><br><br>
  <textarea id="content" placeholder="Write essay"></textarea><br><br>
  <input type="file" id="image"><br><br>
  <button onclick="addPost()">Post</button>
</div>



</body>
</html>
