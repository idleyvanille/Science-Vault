<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Vault</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; font-family:'Orbitron',sans-serif; background:black; color:cyan; }

nav {
  display:flex; justify-content:center; gap:25px;
  background:#0a0a0a; padding:15px;
}

nav button {
  background:black; color:cyan; border:1px solid cyan;
  padding:8px 15px; cursor:pointer;
}
nav button:hover {
  background:cyan; color:black;
  box-shadow:0 0 10px cyan;
}

.panel {
  border:1px solid rgba(0,255,255,0.3);
  padding:20px; margin:20px;
  border-radius:12px;
}

.page{display:none;} .active{display:block;}

#posts {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
  padding:20px;
}

.post-card {
  background:#0a0a0a;
  border:1px solid cyan;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}
.post-card:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px cyan;
}
.post-card img {
  width:100%; height:140px; object-fit:cover;
}

canvas { width:100%; }
</style>
</head>

<body>

<h1 style="text-align:center;">🌌 Science Vault</h1>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('about')">About</button>
</nav>

<div id="home" class="page active">

<div class="panel">
<h2>🔐 Admin Login</h2>
<input id="pw">
<button onclick="login()">Login</button>
</div>

<div id="admin" class="panel" style="display:none;">
<input id="title" placeholder="Title"><br><br>
<textarea id="content"></textarea><br><br>
<input type="file" id="image"><br><br>
<button onclick="addPost()">Post</button>
</div>

<div id="posts"></div>

<div class="panel">
<h2>🪐 Solar System</h2>
<canvas id="sim"></canvas>
</div>

</div>

<div id="about" class="page">
<h2 style="text-align:center;">🌌 About Me</h2>
<p style="text-align:center;">
Hi, I’m Nikisha Pai. Passionate about science & tech 🚀
</p>
</div>

<div id="postView" class="page">
<h2 id="postTitle"></h2>
<img id="postImage" style="width:100%;display:none;">
<p id="postContent"></p>
<button onclick="showPage('home')">⬅ Back</button>
</div>

<div id="planetInfo" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:black;padding:15px;border:1px solid cyan;display:none;">
<h3 id="planetName"></h3>
<p id="planetDesc"></p>
<button onclick="planetInfo.style.display='none'">Close</button>
</div>

<button onclick="toggleMusic()" style="position:fixed;top:10px;right:10px;">🔊</button>
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6d4c3f3e7f.mp3">
</audio>

<script>
// NAV
function showPage(p){
 document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
 document.getElementById(p).classList.add('active');
}

// LOGIN
function login(){
 if(document.getElementById("pw").value==="Redsaucepasta@67"){
  admin.style.display="block";
 }
}

// POSTS
function addPost(){
 let t=title.value,c=content.value,img=image.files[0];
 let post=document.createElement('div');
 post.className='post-card';

 let imageData='';

 function openFull(){
  postTitle.innerText=t;
  postContent.innerText=c;
  if(imageData){postImage.src=imageData;postImage.style.display='block';}
  else postImage.style.display='none';
  showPage('postView');
 }

 if(img){
  let r=new FileReader();
  r.onload=e=>{
   imageData=e.target.result;
   post.innerHTML=`<img src="${imageData}"><h4>${t}</h4>`;
   post.onclick=openFull;
  };
  r.readAsDataURL(img);
 } else {
  post.innerHTML=`<div style="height:140px;background:#111"></div><h4>${t}</h4>`;
  post.onclick=openFull;
 }

 posts.prepend(post);
}

// MUSIC
let playing=false;
function toggleMusic(){
 let m=bgMusic;
 playing ? m.pause() : m.play();
 playing=!playing;
}

// THREE JS
const scene=new THREE.Scene();
const renderer=new THREE.WebGLRenderer({canvas:sim,antialias:true});
renderer.setSize(window.innerWidth,400);
renderer.outputEncoding=THREE.sRGBEncoding;

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/400,0.1,2000);
camera.position.set(0,20,60);

const controls=new THREE.OrbitControls(camera,renderer.domElement);

// LIGHT
const light=new THREE.PointLight(0xffffff,3);
scene.add(light);
scene.add(new THREE.AmbientLight(0x555555));

// STARS
const stars=new THREE.BufferGeometry();
let v=[];
for(let i=0;i<4000;i++)v.push((Math.random()-0.5)*2000,(Math.random()-0.5)*2000,(Math.random()-0.5)*2000);
stars.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
scene.add(new THREE.Points(stars,new THREE.PointsMaterial({color:0xffffff})));

// LOADER
const loader=new THREE.TextureLoader();

// SUN
const sun=new THREE.Mesh(
 new THREE.SphereGeometry(5,64,64),
 new THREE.MeshBasicMaterial({map:loader.load("https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/sun.jpg")})
);
scene.add(sun);

// PLANET SAFE LOADER
function planet(size,texture,dist,speed){
 let mat=new THREE.MeshStandardMaterial({color:0xffffff});
 let mesh=new THREE.Mesh(new THREE.SphereGeometry(size,32,32),mat);

 let pivot=new THREE.Object3D();
 scene.add(pivot); pivot.add(mesh);
 mesh.position.x=dist;

 if(texture){
  loader.load(texture,(tex)=>{
    mat.map=tex;
    mat.needsUpdate=true;
  });
 }

 return {pivot,speed,mesh};
}

// PLANETS
const mercury=planet(0.5,null,8,0.02);
const venus=planet(0.9,"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/venus.jpg",11,0.015);
const earth=planet(1,"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg",14,0.01);
const mars=planet(0.8,"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/mars_1k_color.jpg",17,0.008);
const jupiter=planet(2.5,"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/jupiter.jpg",22,0.006);
const saturn=planet(2.2,"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/saturn.jpg",28,0.005);
const uranus=planet(1.5,"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/uranus.jpg",34,0.003);
const neptune=planet(1.5,"https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/neptune.jpg",40,0.002);

// MOON
const moonPivot=new THREE.Object3D();
earth.mesh.add(moonPivot);
const moon=new THREE.Mesh(new THREE.SphereGeometry(0.27,32,32),new THREE.MeshStandardMaterial({color:0xaaa}));
moon.position.x=2;
moonPivot.add(moon);

// RINGS
const ring=new THREE.Mesh(new THREE.RingGeometry(3,5,64),new THREE.MeshBasicMaterial({color:0xccc,side:THREE.DoubleSide}));
ring.rotation.x=Math.PI/2;
saturn.mesh.add(ring);

// INFO
const data=[
 {mesh:earth.mesh,name:"Earth",desc:"Our home planet"},
 {mesh:mars.mesh,name:"Mars",desc:"Red planet"},
 {mesh:jupiter.mesh,name:"Jupiter",desc:"Largest planet"}
];

const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

window.addEventListener('click',e=>{
 mouse.x=(e.clientX/window.innerWidth)*2-1;
 mouse.y=-(e.clientY/window.innerHeight)*2+1;

 ray.setFromCamera(mouse,camera);
 let hit=ray.intersectObjects(data.map(d=>d.mesh));

 if(hit.length){
  let d=data.find(x=>x.mesh===hit[0].object);
  planetName.innerText=d.name;
  planetDesc.innerText=d.desc;
  planetInfo.style.display='block';
 }
});

// ANIMATE
function animate(){
 requestAnimationFrame(animate);

 mercury.pivot.rotation.y+=mercury.speed;
 venus.pivot.rotation.y+=venus.speed;
 earth.pivot.rotation.y+=earth.speed;
 mars.pivot.rotation.y+=mars.speed;
 jupiter.pivot.rotation.y+=jupiter.speed;
 saturn.pivot.rotation.y+=saturn.speed;
 uranus.pivot.rotation.y+=uranus.speed;
 neptune.pivot.rotation.y+=neptune.speed;

 moonPivot.rotation.y+=0.03;

 controls.update();
 renderer.render(scene,camera);
}
animate();

</script>

<footer style="text-align:center;padding:20px;border-top:1px solid cyan;">
© 2026 Science Vault
</footer>

</body>
</html>
